<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar Assignments Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #1f1f1f;
            --border-bright: #2e2e2e;
            --text: #e8e8e8;
            --text-dim: #555;
            --text-mid: #888;
            --accent: #c8f135;
            --accent-dim: rgba(200, 241, 53, 0.08);
            --red: #ff4444;
            --pdf: #ff6b35;
            --docx: #4da6ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            padding: 48px 24px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 48px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }

        .label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        h1 span {
            color: var(--text-dim);
        }

        .login-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            margin-bottom: 40px;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-mid);
        }

        input {
            background: var(--surface);
            border: 1px solid var(--border-bright);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--text-dim);
        }

        button {
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.15s;
            white-space: nowrap;
            height: fit-content;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .status {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--text-mid);
            margin-bottom: 24px;
            height: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status.error { color: var(--red); }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .count {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-mid);
        }

        .count span {
            color: var(--accent);
            font-weight: 500;
        }

        .filter-row {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border-bright);
            color: var(--text-mid);
            font-size: 10px;
            padding: 4px 10px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .assignments-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .assignment-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: border-color 0.15s, background 0.15s;
            animation: fadeIn 0.2s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .assignment-card:hover {
            border-color: var(--border-bright);
            background: #161616;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .file-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.1em;
            padding: 3px 7px;
            border-radius: 2px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .file-badge.pdf {
            background: rgba(255, 107, 53, 0.12);
            color: var(--pdf);
            border: 1px solid rgba(255, 107, 53, 0.25);
        }

        .file-badge.docx {
            background: rgba(77, 166, 255, 0.1);
            color: var(--docx);
            border: 1px solid rgba(77, 166, 255, 0.2);
        }

        .title {
            font-size: 13px;
            font-weight: 400;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download-btn {
            background: transparent;
            border: 1px solid var(--border-bright);
            color: var(--text-mid);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 5px 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .download-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .login-grid { grid-template-columns: 1fr; }
            .title { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="label">DPS Electronic City</div>
            <h1>Entrar Assignments <span>/ Dashboard</span></h1>
        </header>

        <div class="login-grid">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="E-CITY/000/0000-00">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button id="fetch">Fetch →</button>
        </div>

        <div class="status" id="status"></div>

        <div id="results-wrapper" style="display:none">
            <div class="results-header">
                <div class="count" id="count"></div>
                <div class="filter-row">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pdf">PDF</button>
                    <button class="filter-btn" data-filter="docx">DOCX</button>
                </div>
            </div>
            <div class="assignments-list" id="list"></div>
        </div>
    </div>

    <script>
        const usernameEl = document.getElementById("username")
        const passwordEl = document.getElementById("password")
        const btn = document.getElementById("fetch")
        const status = document.getElementById("status")
        const list = document.getElementById("list")
        const resultsWrapper = document.getElementById("results-wrapper")
        const countEl = document.getElementById("count")
        const BASE = "https://pretty-entrar-dashboard.onrender.com"

        let allAssignments = []
        let activeFilter = "all"

        function getFileType(url) {
            if (url.includes(".pdf")) return "pdf"
            if (url.includes(".docx")) return "docx"
            return "file"
        }

        function renderCards(data) {
            list.innerHTML = ""
            const filtered = activeFilter === "all" ? data : data.filter(a => getFileType(a.url) === activeFilter)

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty">no ${activeFilter} files found</div>`
                return
            }

            filtered.forEach((a, i) => {
                const type = getFileType(a.url)
                const card = document.createElement("div")
                card.className = "assignment-card"
                card.style.animationDelay = `${i * 30}ms`
                card.innerHTML = `
                    <div class="card-left">
                        <span class="file-badge ${type}">${type}</span>
                        <span class="title" title="${a.title}">${a.title}</span>
                    </div>
                    <a class="download-btn" href="${a.url}" target="_blank">Open ↗</a>
                `
                list.appendChild(card)
            })
        }

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"))
                btn.classList.add("active")
                activeFilter = btn.dataset.filter
                renderCards(allAssignments)
            })
        })

        btn.addEventListener("click", async () => {
            const username = usernameEl.value.trim()
            const password = passwordEl.value.trim()

            if (!username || !password) {
                status.className = "status error"
                status.innerHTML = "enter credentials first"
                return
            }

            btn.disabled = true
            status.className = "status"
            status.innerHTML = `<div class="dot"></div> fetching assignments...`
            resultsWrapper.style.display = "none"

            try {
                const res = await fetch(`${BASE}/fetch-assignments`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                })

                if (!res.ok) throw new Error(`server returned ${res.status}`)

                allAssignments = await res.json()
                countEl.innerHTML = `<span>${allAssignments.length}</span> assignments found`
                renderCards(allAssignments)
                resultsWrapper.style.display = "block"
                status.innerHTML = ""

            } catch (err) {
                status.className = "status error"
                status.innerHTML = `error: ${err.message}`
            } finally {
                btn.disabled = false
            }
        })

        usernameEl.addEventListener("keydown", e => e.key === "Enter" && btn.click())
        passwordEl.addEventListener("keydown", e => e.key === "Enter" && btn.click())
    </script>
</body>
</html>
